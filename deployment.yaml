
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timetable-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: timetable
  template:
    metadata:
      labels:
        app: timetable
    spec:
      containers:
      - name: timetable
        image: nidhireddy11/student-timetablee-app:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: timetable-service
spec:
  type: NodePort
  selector:
    app: timetable
  ports:
    - port: 8090
      targetPort: 8090
     nodePort: 30007
